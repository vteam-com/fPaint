name: Flutter Desktop Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v6
        with:
          name: flutter-windows-app
          path: build/windows/x64/runner/Release/**
          retention-days: 14

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies for Linux Build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux App
        run: flutter build linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v6
        with:
          name: flutter-linux-app
          path: build/linux/
          retention-days: 14

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version

      - name: Install Dependencies
        run: flutter pub get

      - name: Build macOS App
        run: flutter build macos

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: flutter-macos-app
          path: build/macos/Build/Products/Release/
          retention-days: 14
