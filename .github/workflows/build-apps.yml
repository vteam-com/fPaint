name: Flutter Desktop Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows

      - name: Zip Windows Build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath
          fpaint-windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v6
        with:
          name: fpaint-windows
          path: fpaint-windows.zip
          retention-days: 14

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies for Linux Build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux App
        run: flutter build linux

      - name: Zip Linux Build
        run: cd build/linux/x64/release/bundle && zip -r
          "$GITHUB_WORKSPACE/fpaint-linux.zip" .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v6
        with:
          name: fpaint-linux
          path: fpaint-linux.zip
          retention-days: 14

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version

      - name: Install Dependencies
        run: flutter pub get

      - name: Build macOS App
        run: flutter build macos

      - name: Zip macOS Build
        run: cd build/macos/Build/Products/Release && zip -r
          "$GITHUB_WORKSPACE/fpaint-macos.zip" *.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: fpaint-macos
          path: fpaint-macos.zip
          retention-days: 14
