# Full pipeline: build desktop apps, build web (with download links), deploy
name: Deploy to Firebase Hosting on merge
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows

      - name: Zip Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath flutter-windows-app.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: flutter-windows-app
          path: flutter-windows-app.zip

  build-macos:
    name: Build macOS
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos

      - name: Zip macOS build
        run: cd build/macos/Build/Products/Release && zip -r "$GITHUB_WORKSPACE/flutter-macos-app.zip" .

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: flutter-macos-app
          path: flutter-macos-app.zip

  build-linux-and-deploy-web:
    name: Build Linux & Deploy Web
    needs: [build-windows, build-macos]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux desktop
        run: flutter build linux

      - name: Zip Linux build
        run: cd build/linux/x64/release/bundle && zip -r "$GITHUB_WORKSPACE/flutter-linux-app.zip" .

      - name: Build web
        run: flutter build web

      - name: Download desktop artifacts
        uses: actions/download-artifact@v7
        with:
          path: desktop-artifacts

      - name: Copy desktop downloads into web build
        run: |
          mkdir -p build/web/downloads
          cp flutter-linux-app.zip build/web/downloads/
          cp desktop-artifacts/flutter-windows-app/flutter-windows-app.zip build/web/downloads/
          cp desktop-artifacts/flutter-macos-app/flutter-macos-app.zip build/web/downloads/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0.9
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VTEAM_PAINT }}
          channelId: live
          projectId: vteam-paint
