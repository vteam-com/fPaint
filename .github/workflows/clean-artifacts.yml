name: Clean Artifacts
permissions:
  actions: write
  contents: read

on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at midnight UTC
  workflow_dispatch:

jobs:
  cleanup_artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Keep only latest artifact per name
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const artifacts = data.artifacts;
            console.log(`Found ${artifacts.length} total artifacts`);

            // Group by name, keep only the most recent per name
            const latestByName = {};
            for (const a of artifacts) {
              if (!latestByName[a.name] || new Date(a.created_at) > new Date(latestByName[a.name].created_at)) {
                latestByName[a.name] = a;
              }
            }
            const keepIds = new Set(Object.values(latestByName).map(a => a.id));
            console.log(`Keeping ${keepIds.size} artifacts (latest per name)`);

            let deleted = 0;
            for (const a of artifacts) {
              if (!keepIds.has(a.id)) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: a.id,
                });
                deleted++;
                console.log(`Deleted: ${a.name} (${a.created_at})`);
              }
            }
            console.log(`Deleted ${deleted} old artifacts`);
