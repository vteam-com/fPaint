name: fpaint
description: "A feature-rich drawing and painting application built with Flutter
  that allows users to create digital artwork on any platform - iOS, Android,
  macOS, Windows, Linux, and Web - from a single code base."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# Repository information
repository: https://github.com/vteam-com/fPaint
homepage: https://github.com/vteam-com/fPaint
issue_tracker: https://github.com/vteam-com/fPaint/issues

version: 1.5.0+1

environment:
  sdk: ">=3.11.4"
  flutter: ">=3.41.7"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  archive: ^4.0.9
  desktop_drop: ^0.7.1
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.4
  image: ^4.8.0
  intl: ^0.20.2
  logging: ^1.3.0
  multi_split_view: ^3.6.1
  package_info_plus: ^9.0.1
  pasteboard: ^0.5.0
  path_provider: ^2.0.11
  provider: ^6.0.5
  shared_preferences: ^2.5.5
  super_clipboard: ^0.1.0
  url_launcher: ^6.1.7
  vector_math: ^2.2.0
  web: ^0.1.0
  window_manager: ^0.5.1
  xml: ^6.1.0

dev_dependencies:
  analyzer: ^5.12.0
  coverage: ^1.2.0
  flutter_launcher_icons: ^0.14.0
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter:
  config:
    enable-swift-package-manager: false

  generate: true
  assets:
    - assets/app_icon.png
    - assets/icons/
    - assets/images/platforms/
    - assets/test/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
          weight: 400
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700

# dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios:
    remove_alpha_ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
  macos:
    generate: true
    image_path: "assets/app_icon.png"
