name: fpaint
description: "A feature-rich drawing and painting application built with Flutter
  that allows users to create digital artwork on any platform - iOS, Android,
  macOS, Windows, Linux, and Web - from a single code base."
# Keywords for SEO and pub.dev (also used for web index.html SEO)
keywords:
  - painting
  - drawing
  - art
  - canvas
  - sketch
  - digital art
  - Flutter
  - cross-platform
  - image editor
  - creative
  - open source
  - fPaint
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# Repository information
repository: https://github.com/vteam-com/fPaint
homepage: https://github.com/vteam-com/fPaint
issue_tracker: https://github.com/vteam-com/fPaint/issues

version: 1.8.8+1

environment:
  sdk: ">=3.12.0"
  flutter: ">=3.44.0"

dependencies:
  archive: ^4.0.9
  desktop_drop: ^0.7.1
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.3.0
  image: ^4.9.1
  intl: any
  logging: any
  multi_split_view: ^3.6.2
  pasteboard: ^0.5.0
  path_provider: 2.1.6
  provider: any
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  vector_math: any
  web: any
  xml: any

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  config:
    enable-swift-package-manager: true

  generate: true
  shaders:
    - shaders/pixel_brush.frag
  assets:
    - assets/app_icon.png
    - assets/icons/
    - assets/images/platforms/
    - assets/test/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
          weight: 400
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700

# dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios:
    remove_alpha_ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
  macos:
    generate: true
    image_path: "assets/app_icon.png"
